<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>StudyTrack</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <!-- Header -->

      <header class="app-header">
        <h1>StudyTrack</h1>

        <p>Plan. Study. Achieve.</p>
      </header>

      <!-- Statistics Dashboard -->

      <section class="stats-section">
        <div class="stat-card">
          <h3>Total</h3>
          <span id="totalCount">0</span>
        </div>

        <div class="stat-card">
          <h3>Pending</h3>
          <span id="pendingCount">0</span>
        </div>

        <div class="stat-card">
          <h3>Completed</h3>
          <span id="completedCount">0</span>
        </div>

        <div class="stat-card">
          <h3>Completion Rate</h3>
          <span id="completionRate">0%</span>
        </div>
      </section>

      <!-- Assignment Form -->

      <form id="assignmentForm">
        <input
          type="text"
          id="assignmentInput"
          placeholder="Assignment Title"
          required
        />

        <input
          type="text"
          id="courseInput"
          placeholder="Course Code"
          required
        />

        <input type="date" id="dueDate" />

        <select id="priorityInput">
          <option value="High">High Priority</option>

          <option value="Medium">Medium Priority</option>

          <option value="Low">Low Priority</option>
        </select>

        <button type="submit">Add Assignment</button>
      </form>

      <!-- Filter Buttons -->

      <div class="filter-bar">
        <button type="button" class="filter-btn active" data-filter="all">
          All
        </button>

        <button type="button" class="filter-btn" data-filter="active">
          Pending
        </button>

        <button type="button" class="filter-btn" data-filter="completed">
          Completed
        </button>
      </div>

      <!-- Assignment List -->

      <ul id="assignmentList"></ul>

      <!-- Empty State -->

      <p id="emptyMsg">No assignments added yet.</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
